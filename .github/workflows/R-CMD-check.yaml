# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
on:
  push:
    branches: [main, master]
    # Skip the check matrix when a commit touches ONLY these process/meta docs.
    # All are .Rbuildignore'd, so R CMD check never sees them; a change here
    # cannot affect the build. Any non-doc file in the same commit still runs
    # the matrix. (pkgdown.yaml is intentionally NOT filtered -- it renders
    # these .md files into the site.)
    paths-ignore:
      - 'CLAUDE.md'
      - 'DESIGN.md'
      - 'MILESTONES.md'
      - 'ROADMAP.md'
      - 'cran-comments.md'
      - 'nested-cv-guide.md'
      - '.claude/**'
  pull_request:
    branches: [main, master]
    paths-ignore:
      - 'CLAUDE.md'
      - 'DESIGN.md'
      - 'MILESTONES.md'
      - 'ROADMAP.md'
      - 'cran-comments.md'
      - 'nested-cv-guide.md'
      - '.claude/**'

name: R-CMD-check.yaml

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest,  r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,  r: 'release'}
          - {os: ubuntu-latest,  r: 'oldrel-1'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      # Parallel testthat (M48): hosted runners have 4 vCPUs; testthat
      # otherwise defaults to 2 workers.
      TESTTHAT_CPUS: 4

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      # Fail fast if a vignettes/*.Rmd.orig was edited without re-running
      # precompute.R (M65). Base R only, so it runs before dependency install;
      # it needs the source checkout (the .Rmd.orig are .Rbuildignore'd, so the
      # tarball R CMD check below cannot see this).
      - name: Check precomputed vignette freshness
        run: Rscript tools/check-vignette-freshness.R
        shell: bash

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
