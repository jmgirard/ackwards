# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
on:
  push:
    branches: [main, master]
    # Skip coverage when a commit touches ONLY process/meta docs (all
    # .Rbuildignore'd; they carry no code, so coverage cannot change).
    paths-ignore:
      - 'CLAUDE.md'
      - 'DESIGN.md'
      - 'MILESTONES.md'
      - 'ROADMAP.md'
      - 'cran-comments.md'
      - 'nested-cv-guide.md'
      - '.claude/**'
  pull_request:
    branches: [main, master]
    paths-ignore:
      - 'CLAUDE.md'
      - 'DESIGN.md'
      - 'MILESTONES.md'
      - 'ROADMAP.md'
      - 'cran-comments.md'
      - 'nested-cv-guide.md'
      - '.claude/**'

name: test-coverage.yaml

permissions: read-all

jobs:
  test-coverage:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      # Parallel testthat (M48): hosted runners have 4 vCPUs; testthat
      # otherwise defaults to 2 workers.
      TESTTHAT_CPUS: 4

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::covr, any::xml2
          needs: coverage

      - name: Test coverage
        run: |
          cov <- covr::package_coverage(
            quiet = FALSE,
            clean = FALSE,
            install_path = file.path(normalizePath(Sys.getenv("RUNNER_TEMP"), winslash = "/"), "package")
          )
          covr::to_cobertura(cov)
        shell: Rscript {0}

      - uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: ${{ github.event_name != 'pull_request' && true || false }}
          file: ./cobertura.xml
          plugin: noop
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Show testthat output
        if: always()
        run: |
          find '${{ runner.temp }}/package' -name 'testthat.Rout*' -exec cat '{}' \; || true
        shell: bash

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-test-failures
          path: ${{ runner.temp }}/package
