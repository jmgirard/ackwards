url: https://jmgirard.github.io/ackwards/
template:
  bootstrap: 5
home:
  strip_header: no
  links:
  - text: Report a bug
    href: https://github.com/jmgirard/ackwards/issues
news:
  releases:
  - text: "0.1.0"
    href: https://github.com/jmgirard/ackwards/releases/tag/v0.1.0
navbar:
  structure:
    left:
    - intro
    - articles
    - reference
    - news
    right:
    - search
    - github
articles:
- title: Getting started
  navbar: ~
  contents: ackwards-intro
- title: Deep dives
  navbar: Deep dives
  contents:
  - ackwards-suggest-k
  - ackwards-interpret
  - ackwards-engines
  - ackwards-ordinal
  - ackwards-forbes
  - ackwards-visualization
reference:
- title: Fit the model
  desc: |
    The main modelling function, a Forbes-style pruning verb, and a helper for
    choosing k.
  contents:
  - ackwards
  - prune
  - suggest_k
  - print.suggest_k
  - autoplot.suggest_k
- title: Interpret factors
  desc: |
    Helpers for understanding what each factor means and labelling it.
  contents:
  - top_items
  - print.top_items
  - label_template
- title: Extract results
  desc: |
    Tidy, glance, augment, summary, and print methods for ackwards objects.
  contents:
  - tidy.ackwards
  - glance.ackwards
  - augment.ackwards
  - summary.ackwards
  - print.ackwards
  - print.summary_ackwards
- title: Low-level utilities
  desc: |
    Functions for advanced use or building on top of ackwards results.
  contents:
  - compute_edges
- title: Visualize
  desc: |
    Diagram and layout helpers for the bass-ackwards hierarchy.
  contents:
  - autoplot
  - autoplot.ackwards
  - ba_layout
- title: Data
  desc: |
    Example datasets bundled with the package.
  contents:
  - bfi25
  - sim16
- title: Re-exported generics
  desc: |
    Generics re-exported from the generics package so they work after `library(ackwards)` without also loading broom.
  contents: reexports

