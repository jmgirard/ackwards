url: https://jmgirard.github.io/ackwards/
template:
  bootstrap: 5
home:
  strip_header: no
  links:
  - text: Report a bug
    href: https://github.com/jmgirard/ackwards/issues
news:
  releases:
  - text: "0.1.0"
    href: https://github.com/jmgirard/ackwards/releases/tag/v0.1.0
navbar:
  structure:
    left:
    - intro
    - articles
    - reference
    - news
    right:
    - search
    - github
articles:
- title: Getting started
  navbar: ~
  contents: ackwards-intro
- title: The workflow
  navbar: The workflow
  contents:
  - ackwards-girard
  - ackwards-suggest-k
  - ackwards-forbes
- title: Model choices
  navbar: Model choices
  contents:
  - ackwards-engines
  - ackwards-ordinal
- title: Interpretation & presentation
  navbar: Interpretation & presentation
  contents:
  - ackwards-interpret
  - ackwards-visualization
reference:
- title: Fit the model
  desc: |
    The main modelling function, a Forbes-style pruning verb, and pre-analysis
    helpers for screening items, choosing k, and gating hierarchy depth on
    replicability.
  contents:
  - ackwards
  - prune
  - boot_edges
  - check_items
  - print.check_items
  - factorability
  - print.factorability
  - suggest_k
  - print.suggest_k
  - autoplot.suggest_k
  - comparability
  - print.comparability
  - autoplot.comparability
- title: Interpret factors
  desc: |
    Helpers for understanding what each factor means and labelling it.
  contents:
  - top_items
  - print.top_items
  - label_template
  - set_factor_labels
  - factor_labels
- title: Extract results
  desc: |
    Tidy, glance, augment, predict, summary, and print methods for ackwards
    objects.
  contents:
  - tidy.ackwards
  - glance.ackwards
  - augment.ackwards
  - predict.ackwards
  - summary.ackwards
  - print.ackwards
  - print.summary_ackwards
- title: Low-level utilities
  desc: |
    Functions for advanced use or building on top of ackwards results.
  contents:
  - compute_edges
- title: Visualize
  desc: |
    Diagram and layout helpers for the bass-ackwards hierarchy.
  contents:
  - autoplot
  - autoplot.ackwards
  - ba_layout
- title: Data
  desc: |
    Example datasets bundled with the package.
  contents:
  - bfi25
  - sim16
  - amh_cor
- title: Re-exported generics
  desc: |
    Generics re-exported from the generics package so they work after `library(ackwards)` without also loading broom.
  contents: reexports

